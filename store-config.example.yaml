# Per-store configuration. Copy to store-config.yaml and fill in.
# store-config.yaml is gitignored; this example is committed.
#
# QUOTE all `code:` values. YAML 1.1 parses bare `no`, `yes`, `on`, `off`,
# `y`, `n` (case-insensitive) as booleans. A Norwegian market with
# `code: no` becomes `code: False` and breaks config validation. Always
# wrap codes in double quotes — see the entries below for the pattern.

store:
  name: "Example Store"
  primary_domain: example.com
  shopify_domain: example-store.myshopify.com
  storefront_type: online_store_2        # "hydrogen" | "online_store_2"
  default_locale: en-US

markets:
  - code: "us"
    name: United States
    locale: en-US
    currency: USD
    url_prefix: ""

domains:
  shopify:        { enabled: true,  api_version: "2025-10" }
  klaviyo:        { enabled: false, api_version: "2024-10-15" }
  meta_ads:       { enabled: false, api_version: "v21.0" }
  google_ads:     { enabled: false }
  microsoft_ads:  { enabled: false }
  merchant_center: { enabled: false }
  gtm:            { enabled: false }
